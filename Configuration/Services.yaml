services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Bnf\NginxCache\:
    resource: '../Classes/*'

  cache.nginx:
    public: true
    class: TYPO3\CMS\Core\Cache\Frontend\FrontendInterface
    factory: ['@TYPO3\CMS\Core\Cache\CacheManager', 'getCache']
    arguments: ['nginx']
